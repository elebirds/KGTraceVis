services:
  neo4j:
    image: neo4j:5.26-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_dbms_security_auth__enabled: "true"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kgtracevis
      POSTGRES_USER: kgtracevis
      POSTGRES_PASSWORD: kgtracevis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kgtracevis -d kgtracevis"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres-init:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      KGTRACE_POSTGRES_DSN: postgresql://kgtracevis:kgtracevis@postgres:5432/kgtracevis
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    command: ["uv", "run", "python", "scripts/init_postgres.py"]

  kg-import:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: neo4j
    depends_on:
      neo4j:
        condition: service_healthy
    restart: "no"
    command: ["uv", "run", "python", "scripts/import_kg.py"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: neo4j
      KGTRACE_POSTGRES_DSN: postgresql://kgtracevis:kgtracevis@postgres:5432/kgtracevis
    volumes:
      - ./runs:/app/runs
      - ./artifacts:/app/artifacts
    depends_on:
      kg-import:
        condition: service_completed_successfully
      postgres-init:
        condition: service_completed_successfully
    command: ["uv", "run", "uvicorn", "kgtracevis.service.api:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
